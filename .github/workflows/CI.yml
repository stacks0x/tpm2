name: CI

env:
  DEBUG: napi:*
  APP_NAME: node-tpm2

on:
  push:
    branches: [main, feature/*]
    paths-ignore:
      - '**/*.md'
      - LICENSE
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tbs-probe-windows:
    name: tbs-probe (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --bin tbs-probe
      - run: cargo test tbs::

  napi-build:
    name: napi build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build
      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          node --input-type=module -e "
          import { Tpm } from './index.js';
          const ok = await Tpm.isAvailable();
          if (!ok) throw new Error('Tpm.isAvailable() expected true on CI runner');
          const info = await Tpm.info();
          console.log('TPM', info);
          "

  esapi-linux:
    name: esapi spike (Linux, optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install tpm2-tss dev
        run: sudo apt-get update && sudo apt-get install -y pkg-config libtss2-dev
      - run: cargo build --features esapi --bin spike

  esapi-windows:
    name: esapi build (Windows, optional)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --features esapi

  rust-default:
    name: cargo test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
