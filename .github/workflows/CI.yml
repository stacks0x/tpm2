name: CI

env:
  DEBUG: napi:*
  APP_NAME: node-tpm2

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - LICENSE
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Default build: no tss-esapi. tbs-probe must compile on Windows without tpm2-tss.
  phase0-windows-tbs:
    name: Phase 0 — tbs-probe compile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --bin tbs-probe

  # Option A feasibility. Failure is a data point (Option B), not a CI failure.
  phase0-windows-esapi:
    name: Phase 0 — esapi build (Option A)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Try esapi build
        id: esapi
        run: |
          if cargo build --features esapi; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
            echo "::notice::Option A (tss-esapi) builds on Windows"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "::warning::Option A failed on Windows — consider Option B"
            exit 1
          fi

  spike-linux:
    name: Spike harness (Linux smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install tpm2-tss dev
        run: sudo apt-get update && sudo apt-get install -y pkg-config libtss2-dev
      - run: cargo build --features esapi --bin spike

  default-build:
    name: Default features (no esapi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --lib
